name: esportes_flutter
description: A new Flutter project.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_expanded_tile: ^0.4.0
  flutter_svg: ^2.0.6
  go_router: ^17.3.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1
  firebase_crashlytics: ^5.2.4
  firebase_analytics: ^12.4.3
  firebase_app_check: ^0.4.5
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  package_info_plus: ^10.2.0
  riverpod_generator: ^4.0.4
  build_runner: ^2.15.1
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  hive_ce_generator: ^1.11.2

flutter_launcher_icons: # dart pub run flutter_launcher_icons
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/app/ic_launcher.png

flutter:
  uses-material-design: true

  assets:
    - assets/app/
    - assets/fonts/
    - assets/icons/

  fonts:
    - family: poppins
      fonts:
        - asset: assets/fonts/poppins.ttf
    - family: display
      fonts:
        - asset: assets/fonts/DisplayOTF.otf
